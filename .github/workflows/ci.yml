name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Type-check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Provide stub values so Next.js env-validation doesn't abort the build.
          # The build itself doesn't need live credentials — this just proves the
          # code compiles and all imports resolve correctly.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET: ci-secret-at-least-32-characters-long
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: 000000000000-ci.apps.googleusercontent.com
          NEXT_PUBLIC_BASE_URL: https://www.ubyte.dev
